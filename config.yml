# =============================================================================
# Security Scanner Configuration
# =============================================================================
# This file contains default configuration for the security scanner.
# Environment variables can override these settings.
# =============================================================================

# General Settings
general:
  # Directories to skip during scanning
  skip_dirs:
    # Recursive dependency trees
    - "**/node_modules"
    - "**/.venv"
    - "**/venv"

    # Python / build cache
    - "**/__pycache__"
    - "**/.pytest_cache"
    - "**/.ruff_cache"
    - "**/.mypy_cache"

    # JS / frontend build outputs
    - "**/.next"
    - "**/.turbo"
    - "**/dist"
    - "**/build"
    - "**/coverage"

    # .NET / compiled outputs
    - "**/bin"
    - "**/obj"
    - "**/Debug"
    - "**/Release"
    - "**/x64"
    - "**/x86"

    # Infra / mobile / package-manager artifacts
    - "**/.terraform"
    - "**/.gradle"
    - "**/Pods"
    - "**/target"

    # VCS / editor / local outputs
    - "**/.git"
    - "**/.idea"
    - "**/.vscode"
    - "**/tmp"
    - "**/logs"
    - "**/security-reports"

# Gitleaks Configuration
gitleaks:
  enabled: true
  # Any secret found will fail the scan
  fail_on_secrets: true

# Semgrep Configuration
semgrep:
  enabled: true
  # Rulesets to use
  rulesets:
    - p/security-audit
    - p/secrets
  # Minimum severity to fail (CRITICAL, HIGH, MEDIUM, LOW, NONE)
  fail_on_severity: HIGH

# Trivy Configuration
trivy:
  # Timeout passed to Trivy filesystem scans
  timeout: 30m

  vulnerability:
    enabled: true
    # Maximum allowed vulnerabilities before failing
    max_critical: 0
    max_high: 0
    # -1 means unlimited
    max_medium: -1
    max_low: -1

  config:
    enabled: true
    # Fail on IaC misconfigurations
    fail_on_critical: true
    fail_on_high: true

  license:
    enabled: true
    # Forbidden licenses (will fail if found)
    forbidden_licenses:
      - GPL-3.0
      - AGPL-3.0

  image:
    # Image scanning is opt-in (run via --command trivy-image --image-ref <ref>)
    # It is not included in the "all" command unless IMAGE_REF is set.
    enabled: true
    # Maximum allowed vulnerabilities before failing
    max_critical: 0
    max_high: 0
    # -1 means unlimited
    max_medium: -1
    max_low: -1

# Syft Configuration
syft:
  enabled: true
  # Output formats
  formats:
    - spdx-json
    - cyclonedx-json

# Hadolint Configuration
hadolint:
  enabled: true
  # Fail on these rule levels
  fail_on:
    - error
  # Rules to ignore (example)
  ignored_rules: []
    # - DL3008
    # - DL3009

# ShellCheck Configuration
shellcheck:
  enabled: true
  # Minimum severity included in findings (error, warning, info, style)
  severity: warning

# yamllint Configuration
yamllint:
  enabled: true
  # Fail on these levels
  fail_on:
    - error
    - warning
